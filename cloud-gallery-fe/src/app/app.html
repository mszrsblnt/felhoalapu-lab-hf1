<div class="app-shell">
  <om-silk class="silk-layer" [speed]="0.015" [scale]="0.9" [color]="getPrimaryColor()"></om-silk>

  <div class="app-content glass-shell">
    <app-navbar class="fixed-top"></app-navbar>

    <main class="app-main pt-5 mt-2">
      <router-outlet></router-outlet>
    </main>

    <footer class="app-footer text-center small text-secondary mt-auto">
      <span class="me-3">Backend: {{ backendStatus() }}</span><br>
      <span>Database: {{ databaseStatus() }}</span><br>
      <span>TimeStamp: {{ timestamp() | date:'yyyy-MM-dd HH:mm:ss' }}</span>
    </footer>
  </div>
</div>

<app-toast-container></app-toast-container>
